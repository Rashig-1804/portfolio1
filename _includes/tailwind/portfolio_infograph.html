{% assign data = site.data[page.infoGraph] %}
<div class="p-8">
    <h1 class="text-5xl mb-4 font-bold">{{ data.Title }}</h1>
    <p class="text-lg mb-8 text-gray-300">{{ data.Description }}</p>

    <div id="rows" class="grid gap-6">
      {% for topic in data.Topics %}
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center p-6 rounded-lg border border-gray-700 bg-gray-900 shadow-md">
          
          <div class="text-center">
            <a href="{{ site.baseurl }}{{ topic.link }}">
              <img src="{{ site.baseurl }}/images/{{ topic.image }}" alt="{{ topic.alt }}" class="rounded-lg mx-auto h-40 w-full object-cover border border-gray-600">
            </a>
          </div>

          <div>
            <h3 class="text-xl font-semibold mb-2 text-blue-400">{{ topic.title }}</h3>
            <ul class="list-disc list-inside text-sm space-y-1 text-gray-300">
              {% for point in topic.keyPoints %}
                <li>{{ point }}</li>
              {% endfor %}
            </ul>
          </div>

          <div>
            <h3 class="text-xl font-semibold mb-2 text-red-400">{{ topic.subtitle }}</h3>
            <p class="text-sm text-gray-400 leading-relaxed">{{ topic.description }}</p>
          </div>

        </div>
      {% endfor %}
    </div>
</div>
